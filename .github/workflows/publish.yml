name: Publish Moodle Image

on:
  push:
    tags:
      - 'v*'
  repository_dispatch:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  MOODLE_LATEST: 502
  PHP_LATEST: 8.4
  PHP_STABLE: 8.3

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php_version: ['8.3', '8.4']
        moodle_major: ['501', '502']

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current date and short SHA
        id: vars
        run: |
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Determine Trigger Cause
        id: cause
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            TRIGGERS=$(echo '${{ toJson(github.event.client_payload.triggers) }}' | jq -r '. | join(", ")')
            echo "msg=Upstream: ${TRIGGERS:-Auto-update}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "msg=Manual: ${{ github.actor }}" >> $GITHUB_OUTPUT
          else
            echo "msg=Push: ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Primary versioned tag (e.g., 501-php8.4)
            type=raw,value=${{ matrix.moodle_major }}-php${{ matrix.php_version }}

            # Major version tag (e.g., 501) points to "stable" (i.e. recommended by moodle) PHP
            type=raw,value=${{ matrix.moodle_major }},enable=${{ matrix.php_version == env.PHP_STABLE }}

            # 'latest' tag points to latest major (501) and "latest" (latest release compatible with moodle) PHP
            type=raw,value=latest,enable=${{ matrix.php_version == env.PHP_LATEST && matrix.moodle_major == env.MOODLE_LATEST }}
          labels: |
            org.opencontainers.image.version=${{ matrix.moodle_major }}-php${{ matrix.php_version }}
            org.opencontainers.image.description=Moodle ${{ matrix.moodle_major }} on PHP ${{ matrix.php_version }} | Ref: ${{ github.ref_name }} (${{ steps.vars.outputs.sha_short }}) | Trigger: ${{ steps.cause.outputs.msg }} | Built: ${{ steps.vars.outputs.date }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
          annotations: |
            org.opencontainers.image.version=${{ matrix.moodle_major }}-php${{ matrix.php_version }}
            org.opencontainers.image.description=Moodle ${{ matrix.moodle_major }} on PHP ${{ matrix.php_version }} | Ref: ${{ github.ref_name }} (${{ steps.vars.outputs.sha_short }}) | Trigger: ${{ steps.cause.outputs.msg }} | Built: ${{ steps.vars.outputs.date }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          # Disable provenance and sbom to avoid 'unknown/unknown' artifacts in GHCR
          provenance: false
          sbom: false
          # Use unique scope per PHP version to prevent matrix cache collisions
          cache-from: type=gha,scope=moodle-${{ matrix.moodle_major }}-php-${{ matrix.php_version }}
          cache-to: type=gha,mode=max,scope=moodle-${{ matrix.moodle_major }}-php-${{ matrix.php_version }}
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
            MOODLE_MAJOR=${{ matrix.moodle_major }}
